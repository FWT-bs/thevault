<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Vault v2 — Liquid Glass</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  html,body { margin:0; padding:0; height:100%; background:#1a1a1a; font-family:-apple-system,system-ui,sans-serif; overflow:hidden; }
  *{box-sizing:border-box;}
  #root{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .anim{animation:fadeUp 240ms cubic-bezier(.2,.8,.2,1);}
  ::-webkit-scrollbar{display:none;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/ios-frame.jsx"></script>
<script type="text/babel" src="components/screens-v2.jsx"></script>
<script type="text/babel" data-presets="react">
const PHONE_W=390, PHONE_H=844;
const App=()=>{
  const [tab,setTab]=React.useState(()=>localStorage.getItem('vault.v2.tab')||'Home');
  const [k,setK]=React.useState(0);
  const nav=(t)=>{ if(t===tab)return; setTab(t); setK(x=>x+1); localStorage.setItem('vault.v2.tab',t); };
  const [scale,setScale]=React.useState(1);
  React.useEffect(()=>{
    const fit=()=>{const s=Math.min((window.innerWidth-40)/PHONE_W,(window.innerHeight-40)/PHONE_H,1);setScale(s);};
    fit(); window.addEventListener('resize',fit); return()=>window.removeEventListener('resize',fit);
  },[]);
  const Screen={Home:HomeScreen,Earn:EarnScreen,Wallet:WalletScreen,Profile:ProfileScreen}[tab];
  return (
    <div style={{transform:`scale(${scale})`,transformOrigin:'center center'}}>
      <div style={{width:PHONE_W,height:PHONE_H,borderRadius:54,overflow:'hidden',position:'relative',background:'#000',boxShadow:'0 40px 100px rgba(0,0,0,0.55), 0 0 0 10px #0a0a0a, 0 0 0 11px rgba(255,255,255,0.08)'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,zIndex:40,pointerEvents:'none'}}><IOSStatusBar dark={false}/></div>
        <div style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
        <div style={{position:'absolute',bottom:8,left:0,right:0,zIndex:60,display:'flex',justifyContent:'center',pointerEvents:'none'}}>
          <div style={{width:139,height:5,borderRadius:100,background:'rgba(0,0,0,0.3)'}}/>
        </div>
        <div key={k} className="anim" style={{position:'absolute',inset:0}}><Screen onNav={nav}/></div>
        <TabBar active={tab} onNav={nav}/>
      </div>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
